<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Bhoomi Mitra Chatbot</title>
  <link rel="stylesheet" href="/static/stylechatbot.css">
  <script src="/static/config.js?v=2.0"></script>
  <script defer src="/static/chatbot.js?v=2.0"></script>
</head>
<body>
  <div class="chat-container">
    <div class="chat-header">
      <div class="bot-header">
        <img src="/static/Assets/Favicon.png" class="bot-icon">
        <div>
          <h2>Bhoomi Mitra</h2>
          <span class="online-status">Online</span>
        </div>
      </div>
      <button class="close-btn" onclick="const role=localStorage.getItem('user_role'); window.location.href=(role==='contractor'?'/contractor/dashboard':'/farmer/dashboard')">✖</button>
    </div>
    <div class="chat-body" id="chatBox"></div>
    <div class="chat-footer">
      <div class="input-container">
        <input type="text" id="userInput" placeholder="Type here…" disabled />
        <button id="sendBtn" class="send-btn" disabled>➤</button>
      </div>
    </div>
  </div>
  <script>
    if (!localStorage.getItem("access_token")) {
      window.location.replace("/signup");
    }
  </script>
</body>
</html>

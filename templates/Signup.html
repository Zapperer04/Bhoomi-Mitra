<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Signup – Bhoomi Mitra</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;600;700;800&family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,600;1,9..40,400&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='Signup.css') }}">
</head>
<body>

<nav class="signup-nav">
    <div class="nav-left">
        <a href="{{ url_for('index') }}" class="nav-logo">Bhoomi Mitra</a>
    </div>
    <div class="nav-right">
        <a href="{{ url_for('index') }}" class="nav-back" data-i18n="home.back_home">← <span data-i18n="nav.back_home">Back to Home</span></a>
        <div class="lang-selector" id="langSelector">
            <button class="lang-btn lang-btn-light" id="langBtn" title="Change Language">🌐 <span id="langLabel">EN</span></button>
            <div class="lang-dropdown hidden" id="langDropdown">
                <button data-lang="en">English</button>
                <button data-lang="hi">हिंदी</button>
            </div>
        </div>
    </div>
</nav>

<div class="signup-page">
    <div class="signup-card">
        <h2 data-i18n="signup.title">Create your account</h2>
        <p class="subtitle" data-i18n="signup.subtitle">Select your role to continue</p>

        <div class="role-toggle">
            <button class="role-btn active" data-role="farmer" data-i18n="signup.role_farmer">Farmer</button>
            <button class="role-btn" data-role="contractor" data-i18n="signup.role_contractor">Contractor</button>
        </div>

        <form id="signupForm">
            <input type="text" id="name"
                data-i18n="signup.name_placeholder"
                data-i18n-attr="placeholder"
                placeholder="Full Name" required>
            <input type="tel" id="phone"
                data-i18n="signup.phone_placeholder"
                data-i18n-attr="placeholder"
                placeholder="Phone Number" required>
            <input type="password" id="password"
                data-i18n="signup.password_placeholder"
                data-i18n-attr="placeholder"
                placeholder="Password" required>

            <div class="role-field farmer-field">
                <input type="text" id="village"
                    data-i18n="signup.village_placeholder"
                    data-i18n-attr="placeholder"
                    placeholder="Village / District">
                <input type="text" id="primaryCrops"
                    data-i18n="signup.crops_placeholder"
                    data-i18n-attr="placeholder"
                    placeholder="Primary Crops">
            </div>

            <div class="role-field contractor-field hidden">
                <input type="text" id="businessType"
                    data-i18n="signup.business_placeholder"
                    data-i18n-attr="placeholder"
                    placeholder="Business Type">
                <input type="text" id="regions"
                    data-i18n="signup.regions_placeholder"
                    data-i18n-attr="placeholder"
                    placeholder="Operating Regions">
            </div>

            <button type="submit" class="submit-btn" data-i18n="signup.submit">Create Account</button>
        </form>
    </div>
</div>

<script src="{{ url_for('static', filename='dashboard_i18n.js') }}?v=6"></script>
<script src="{{ url_for('static', filename='i18n.js') }}?v=6"></script>
<script src="{{ url_for('static', filename='script.js') }}"></script>
<script>
// ── Role toggle ───────────────────────────────────────────────────────────────
let selectedRole = "farmer";
const roleButtons     = document.querySelectorAll(".role-btn");
const farmerFields    = document.querySelector(".farmer-field");
const contractorFields = document.querySelector(".contractor-field");

roleButtons.forEach(btn => {
    btn.addEventListener("click", () => {
        roleButtons.forEach(b => b.classList.remove("active"));
        btn.classList.add("active");
        selectedRole = btn.dataset.role;
        if (selectedRole === "farmer") {
            farmerFields.classList.remove("hidden");
            contractorFields.classList.add("hidden");
        } else {
            contractorFields.classList.remove("hidden");
            farmerFields.classList.add("hidden");
        }
    });
});
window.getSelectedSignupRole = () => selectedRole;

// ── Language Selector ─────────────────────────────────────────────────────────
(function () {
    const LANG_LABELS = {
        en:"EN", hi:"HI", mr:"MR", te:"TE", kn:"KN",
        ta:"TA", gu:"GU", pa:"PA", bn:"BN", or:"OR"
    };
    const btn      = document.getElementById("langBtn");
    const label    = document.getElementById("langLabel");
    const dropdown = document.getElementById("langDropdown");

    function applyLang(lang) {
        if (!window.DT) return;
        window.DT.setLang(lang);
        label.textContent = LANG_LABELS[lang] || lang.toUpperCase();
        document.querySelectorAll("[data-i18n]").forEach(el => {
            const key  = el.getAttribute("data-i18n");
            const attr = el.getAttribute("data-i18n-attr");
            const text = window.DT.t(key);
            if (attr) { el.setAttribute(attr, text); }
            else {
                const hasChildEls = [...el.childNodes].some(n => n.nodeType === Node.ELEMENT_NODE);
                if (!hasChildEls) { el.textContent = text; }
            }
        });
        window.dispatchEvent(new Event("bhoomi:langchange"));
        dropdown.classList.add("hidden");
    }

    btn.addEventListener("click", e => { e.stopPropagation(); dropdown.classList.toggle("hidden"); });
    dropdown.querySelectorAll("button[data-lang]").forEach(b => b.addEventListener("click", () => applyLang(b.dataset.lang)));
    document.addEventListener("click", () => dropdown.classList.add("hidden"));
    window.DT?.ready.then(() => { label.textContent = LANG_LABELS[window.DT.getLang()] || "EN"; });
})();
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Login – Bhoomi Mitra</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;600;700;800&family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,600;1,9..40,400&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='Signup.css') }}">
</head>
<body>

<nav class="signup-nav">
    <div class="nav-left">
        <a href="{{ url_for('index') }}" class="nav-logo">Bhoomi Mitra</a>
    </div>
    <div class="nav-right">
        <a href="{{ url_for('index') }}" class="nav-back" data-i18n="home.back_home">← Back to Home</a>
        <div class="lang-selector" id="langSelector">
            <button class="lang-btn lang-btn-light" id="langBtn" title="Change Language">🌐 <span id="langLabel">EN</span></button>
            <div class="lang-dropdown hidden" id="langDropdown">
                <!-- Dynamically populated by i18n.js -->
            </div>
        </div>
    </div>
</nav>

<div class="signup-page">
    <div class="signup-card">
        <h2 data-i18n="login.title">Welcome back</h2>
        <p class="subtitle" data-i18n="login.subtitle">Login to your account</p>

        <form id="loginForm">
            <input type="tel" id="phone"
                data-i18n="login.phone_placeholder"
                data-i18n-attr="placeholder"
                placeholder="Phone Number" required>
            <input type="password" id="password"
                data-i18n="login.password_placeholder"
                data-i18n-attr="placeholder"
                placeholder="Password" required>
            <button type="submit" class="submit-btn" data-i18n="login.submit">Login</button>
        </form>

        <p class="subtitle" style="margin-top:18px;">
            <span data-i18n="login.no_account">Don't have an account?</span>
            <a href="{{ url_for('signup') }}" style="color:#2E7D32;font-weight:600;" data-i18n="login.create_one">Create one</a>
        </p>
    </div>
</div>

<script src="{{ url_for('static', filename='dashboard_i18n.js') }}?v=6"></script>
<script src="{{ url_for('static', filename='i18n.js') }}?v=6"></script>
<script src="{{ url_for('static', filename='script.js') }}"></script>
</body>
</html>

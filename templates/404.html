<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 - Page Not Found | Bhoomi Mitra</title>
    <link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --green-700: #047857;
            --green-600: #059669;
            --gray-800: #1f2937;
            --gray-500: #6b7280;
        }
        body {
            font-family: 'Sora', sans-serif;
            background: #f9fafb;
            color: var(--gray-800);
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            text-align: center;
        }
        .container {
            max-width: 500px;
            padding: 2rem;
        }
        .icon {
            font-size: 5rem;
            margin-bottom: 1rem;
        }
        h1 {
            font-size: 3rem;
            font-weight: 800;
            margin-bottom: 1rem;
            color: var(--green-700);
        }
        p {
            font-size: 1.1rem;
            color: var(--gray-500);
            margin-bottom: 2rem;
        }
        .btn {
            display: inline-block;
            background: var(--green-600);
            color: white;
            padding: 0.75rem 1.5rem;
            border-radius: 12px;
            text-decoration: none;
            font-weight: 700;
            transition: transform 0.2s;
        }
        .btn:hover {
            transform: translateY(-2px);
            background: var(--green-700);
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="icon">🌾</div>
        <h1>404</h1>
        <p>Oops! The field you're looking for doesn't exist or has been moved.</p>
        <a href="/" class="btn">Back to Home</a>
    </div>
</body>
</html>
